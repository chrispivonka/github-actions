# Example caller for reusable-scorecard.yml.
# Copy into your repo as .github/workflows/scorecard.yml.
# Set publish-results: false if this repo is private.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "20 6 * * 3" # weekly, Wednesday 06:20 UTC
  push:
    branches: [main]

permissions: read-all

# Never runs on a PR — queue overlapping runs rather than cancel them.
concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    uses: chrispivonka/github-actions/.github/workflows/reusable-scorecard.yml@main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    with:
      publish-results: true
