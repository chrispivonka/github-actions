# Example caller for reusable-dependabot-automerge.yml.
# Copy into your repo as .github/workflows/dependabot-automerge.yml.
#
# Before relying on this: configure branch protection on your default branch
# with your CI jobs marked as required status checks. Auto-merge only waits for
# checks that are required — without that, this merges Dependabot PRs
# immediately, without waiting for CI. See reusable-dependabot-automerge.yml's
# header for details.

name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  automerge:
    uses: chrispivonka/github-actions/.github/workflows/reusable-dependabot-automerge.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      merge-method: squash
      # Uncomment to only auto-merge patch/minor bumps, requiring manual review
      # for majors:
      # restrict-to-update-types: "version-update:semver-patch,version-update:semver-minor"
