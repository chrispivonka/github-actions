#
# Reusable Node.js/TypeScript CI workflow: install, lint, type-check, test, build,
# across a version matrix.
#
# Informed by google/zx (test+matrix workflow, scheduled test cron) and
# google/magika's js-docs-builder.yml. Matrix-per-version-axis and least-privilege
# permissions follow the pattern observed across both orgs' language-specific CI
# (e.g. apple's swift_package_test.yml matrix design, translated to Node's
# equivalent axis: node-version). See docs/research/ for citations.
#
# Required caller permissions:
#   permissions:
#     contents: read
#
# Example caller: examples/node-ci.yml
#
# Assumes a package.json with "lint", "typecheck", "test", and "build" npm scripts;
# any script that doesn't exist in your repo can be disabled via the run-* inputs.

name: Node.js CI

on:
  workflow_call:
    inputs:
      node-versions:
        description: JSON array of Node versions to test, e.g. '["20", "22", "24"]'.
        required: false
        type: string
        default: '["22"]'
      os:
        description: JSON array of runner images.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      package-manager:
        description: "One of: npm, yarn, pnpm."
        required: false
        type: string
        default: npm
      working-directory:
        description: Directory containing package.json.
        required: false
        type: string
        default: "."
      run-lint:
        required: false
        type: boolean
        default: true
      run-typecheck:
        required: false
        type: boolean
        default: true
      run-test:
        required: false
        type: boolean
        default: true
      run-build:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ci:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
        os: ${{ fromJSON(inputs.os) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci

      - name: Install dependencies (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn install --frozen-lockfile

      - name: Install dependencies (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Lint
        if: inputs.run-lint
        run: ${{ inputs.package-manager }} run lint

      - name: Type check
        if: inputs.run-typecheck
        run: ${{ inputs.package-manager }} run typecheck

      - name: Test
        if: inputs.run-test
        run: ${{ inputs.package-manager }} test

      - name: Build
        if: inputs.run-build
        run: ${{ inputs.package-manager }} run build
