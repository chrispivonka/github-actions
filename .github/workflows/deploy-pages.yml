#
# Deploys docs/site/ to GitHub Pages. This is a caller workflow (not a
# workflow_call reusable) since Pages publishing is specific to this repo.
#
# Follows the standard actions/configure-pages + actions/upload-pages-artifact +
# actions/deploy-pages sequence, the same pattern observed in
# apple/containerization (docs-release.yaml) and google/comprehensive-rust
# (publish.yml). concurrency.cancel-in-progress: false so an in-flight deploy
# always finishes rather than being superseded mid-publish.

name: Deploy docs site

on:
  push:
    branches: [main]
    paths: ["docs/site/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
