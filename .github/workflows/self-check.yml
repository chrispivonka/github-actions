#
# Self-application: this repo's own workflows are audited by the same zizmor and
# actionlint reusable workflows it publishes for consumers. Dogfooding, in the
# spirit of google/zx and google/osv-scanner running zizmor on themselves.
#
# zizmor is scoped to .github/workflows only: those are the only files GitHub
# Actions ever auto-discovers and executes in this repo, so they're the only real
# security attack surface, and its CLI doesn't reliably support scanning two
# directories in one invocation (see reusable-zizmor.yml's `path` input for why —
# this was learned the hard way in this repo's own commit history). actionlint has
# no such limitation, so it also covers examples/ — those files are inert here,
# but they're what consumers copy-paste, so a schema/syntax mistake in one is worth
# catching before it ships.

name: Self-check workflows

on:
  push:
    branches: [main]
    paths: [".github/workflows/**", "examples/**"]
  pull_request:
    paths: [".github/workflows/**", "examples/**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  zizmor:
    uses: ./.github/workflows/reusable-zizmor.yml
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      path: ".github/workflows"
      min-severity: medium

  actionlint:
    uses: ./.github/workflows/reusable-actionlint.yml
    permissions:
      contents: read
    with:
      files: ".github/workflows/*.yml examples/*.yml"
