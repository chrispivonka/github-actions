#
# Reusable workflow: publishes a GitHub Release with build artifacts attached.
#
# Informed by apple/container (release.yml — semver-tag-triggered, builds artifacts,
# publishes as a draft prerelease first) and google/jsonnet (release.yml —
# workflow_dispatch-driven with a prerelease boolean input, draft releases). Both
# orgs favor draft releases so a human confirms publication rather than releasing
# automatically on tag push. See docs/research/ for citations.
#
# This workflow does NOT build your artifacts — build them in the caller job and
# pass the output directory via `files`. Required caller permissions:
#   permissions:
#     contents: write
#
# Example caller: examples/github-release.yml

name: GitHub release

on:
  workflow_call:
    inputs:
      tag-name:
        description: Tag to attach the release to (defaults to the triggering ref).
        required: false
        type: string
        default: ""
      files:
        description: Newline- or glob-separated list of artifact paths to attach.
        required: true
        type: string
      draft:
        description: Create as a draft release requiring manual publish.
        required: false
        type: boolean
        default: true
      prerelease:
        description: Mark the release as a prerelease.
        required: false
        type: boolean
        default: false
      generate-release-notes:
        description: Auto-generate release notes from merged PRs.
        required: false
        type: boolean
        default: true
      artifact-name:
        description: >-
          If set, download this actions/upload-artifact artifact into the workspace
          before publishing (lets a separate build job hand off files here).
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ inputs.tag-name }}
          files: ${{ inputs.files }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate-release-notes }}
