#
# Reusable zizmor workflow: statically audits GitHub Actions workflow files
# themselves for security issues (script injection, unpinned actions, excessive
# permissions, etc).
#
# Informed by google/zx (zizmor.yml) and google/osv-scanner (zizmor.yml) — both use
# `permissions: {}` at top with a job-scoped minimal grant. Complements
# google/.github's org-level semgrep scan of workflow files
# (action_scanning.yml), which has no direct GHA-native equivalent but zizmor covers
# much of the same ground. See docs/research/google.md for citations.
#
# This is exactly the kind of check a workflow-library repo like this one should run
# on itself. Required caller permissions:
#   permissions:
#     contents: read
#     actions: read
#     security-events: write   # only if uploading SARIF
#
# Example caller: examples/zizmor.yml (also self-applied in this repo's own CI).

name: zizmor

on:
  workflow_call:
    inputs:
      path:
        description: >-
          Space-separated list of paths to scan (workflow/action files). Include any
          directory holding example/template caller workflows, not just
          .github/workflows, so those get audited too.
        required: false
        type: string
        default: .github/workflows
      min-severity:
        description: "Minimum severity to report: unknown, informational, low, medium, high."
        required: false
        type: string
        default: medium
      zizmor-version:
        description: Pinned zizmor version (installed via uvx).
        required: false
        type: string
        default: "1.22.0"
      upload-sarif:
        description: Upload results as SARIF to code scanning.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit workflows with zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Run zizmor
        # inputs.path is deliberately unquoted to allow space-separated multiple paths.
        run: |
          uvx "zizmor@${{ inputs.zizmor-version }}" ${{ inputs.path }} \
            --min-severity="${{ inputs.min-severity }}" \
            --format=sarif > results.sarif
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload SARIF results
        if: ${{ inputs.upload-sarif && !cancelled() }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
          category: zizmor
