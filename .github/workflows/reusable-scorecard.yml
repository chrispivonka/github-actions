#
# Reusable OpenSSF Scorecard workflow: supply-chain security posture scoring,
# published as a badge and uploaded as code-scanning SARIF.
#
# This is the single most consistent security workflow across both orgs studied —
# 39 hits in the Google sample (google/guava, google/gson, google/brotli,
# google/magika, google/libphonenumber/scorecards.yml, google/osv-scanner,
# google/closure-compiler, google/benchmark/ossf.yml) — all using the same canonical
# template: branch_protection_rule + weekly cron + push-to-default triggers,
# `permissions: read-all` at top, job-scoped `security-events: write` +
# `id-token: write`, `publish_results: true`. No equivalent workflow was found in the
# Apple sample. See docs/research/google.md for citations.
#
# Required caller permissions:
#   permissions: read-all
#
# Recommended caller triggers: branch_protection_rule, weekly schedule, push to the
# default branch. Example caller: examples/scorecard.yml
#
# NOTE: publish-results requires the repository to be public. For private repos, set
# publish-results: false and rely solely on the SARIF upload to code scanning.

name: OpenSSF Scorecard

on:
  workflow_call:
    inputs:
      publish-results:
        description: Publish results to the public Scorecard API/badge (public repos only).
        required: false
        type: boolean
        default: true
      results-file:
        description: SARIF output filename.
        required: false
        type: string
        default: results.sarif

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: ${{ inputs.results-file }}
          results_format: sarif
          publish_results: ${{ inputs.publish-results }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: ${{ inputs.results-file }}
